<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Fan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d0500;
            font-family: 'Georgia', serif;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 20% 80%, rgba(120, 8, 8, 0.55) 0%, transparent 65%),
                radial-gradient(ellipse 40% 40% at 80% 20%, rgba(50, 0, 0, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse 100% 50% at 50% 100%, rgba(80, 5, 5, 0.4) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        #stage {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            perspective: 900px;
        }

        #fan-root {
            position: relative;
            width: 0;
            height: 0;
            transform-style: preserve-3d;
        }

        .card-wrap {
            position: absolute;
            width: 130px;
            height: 185px;
            bottom: 0;
            left: -65px;
            transform-origin: center bottom;
            transform-style: preserve-3d;
            cursor: pointer;
            will-change: transform;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            border-radius: 10px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.7),
                0 2px 8px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .card-face,
        .card-back {
            position: absolute;
            inset: 0;
            border-radius: 10px;
            backface-visibility: hidden;
        }

        .card-face {
            background: #faf8f3;
            border: 1px solid rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .card-face::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 10px;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.5) 0%, transparent 60%);
            pointer-events: none;
        }

        .corner {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }

        .corner.tl {
            top: 7px;
            left: 9px;
        }

        .corner.br {
            bottom: 7px;
            right: 9px;
            transform: rotate(180deg);
        }

        .rank {
            font-size: 22px;
            font-weight: bold;
            line-height: 1;
            font-family: 'Georgia', serif;
        }

        .suit-small {
            font-size: 13px;
            line-height: 1;
            margin-top: 1px;
        }

        .center-suit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 58px;
            line-height: 1;
            user-select: none;
        }

        .red {
            color: #c41010;
        }

        .black {
            color: #111111;
        }

        .card-back {
            background: #1a0404;
            transform: rotateY(180deg);
            border: 1px solid #3a0808;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-back::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1.5px solid #8b1a1a;
            border-radius: 7px;
        }

        .card-back::after {
            content: '';
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(200, 168, 75, 0.6);
            border-radius: 5px;
        }

        .back-pattern {
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(45deg, rgba(139, 26, 26, 0.18) 0px, rgba(139, 26, 26, 0.18) 1px, transparent 1px, transparent 10px),
                repeating-linear-gradient(-45deg, rgba(139, 26, 26, 0.18) 0px, rgba(139, 26, 26, 0.18) 1px, transparent 1px, transparent 10px);
        }

        .back-emblem {
            position: relative;
            z-index: 1;
            width: 42px;
            height: 42px;
            background: #c8a84b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #1a0404;
            box-shadow: 0 0 14px rgba(200, 168, 75, 0.45);
        }

        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(255, 255, 255, 0.35);
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            animation: hint-bob 2.2s ease-in-out infinite;
            pointer-events: none;
            white-space: nowrap;
            transition: opacity 0.5s;
        }

        .hint.gone {
            opacity: 0;
        }

        @keyframes hint-bob {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(5px);
            }
        }
    </style>
</head>

<body>

    <div id="stage">
        <div id="fan-root"></div>
    </div>
    <div class="hint" id="hint">&#8595; &nbsp; scroll to fan &nbsp; &#8595;</div>

    <script>
        /* ── Card data ── */
        const CARDS = [
            { rank: '3', suit: '\u2663', red: false },
            { rank: 'A', suit: '\u2663', red: false },
            { rank: 'A', suit: '\u2666', red: true },
            { rank: '5', suit: '\u2666', red: true },
            { rank: '5', suit: '\u2660', red: false },
            { rank: 'Q', suit: '\u2666', red: true },
            { rank: 'Q', suit: '\u2665', red: true },
            { rank: 'A', suit: '\u2665', red: true },
            { rank: '9', suit: '\u2666', red: true },
            { rank: '4', suit: '\u2666', red: true },
        ];
        const N = CARDS.length;

        /* ── Build DOM ── */
        const root = document.getElementById('fan-root');
        const wraps = [];
        const inners = [];

        CARDS.forEach(function (cd, i) {
            var cls = cd.red ? 'red' : 'black';

            var wrap = document.createElement('div');
            wrap.className = 'card-wrap';
            wrap.style.zIndex = i;

            var inner = document.createElement('div');
            inner.className = 'card-inner';

            /* Face */
            var face = document.createElement('div');
            face.className = 'card-face';
            face.innerHTML =
                '<div class="corner tl">' +
                '<span class="rank ' + cls + '">' + cd.rank + '</span>' +
                '<span class="suit-small ' + cls + '">' + cd.suit + '</span>' +
                '</div>' +
                '<div class="center-suit ' + cls + '">' + cd.suit + '</div>' +
                '<div class="corner br">' +
                '<span class="rank ' + cls + '">' + cd.rank + '</span>' +
                '<span class="suit-small ' + cls + '">' + cd.suit + '</span>' +
                '</div>';

            /* Back */
            var back = document.createElement('div');
            back.className = 'card-back';
            back.innerHTML = '<div class="back-pattern"></div><div class="back-emblem">\u2660</div>';

            inner.appendChild(face);
            inner.appendChild(back);
            wrap.appendChild(inner);
            root.appendChild(wrap);

            wraps.push(wrap);
            inners.push(inner);
        });

        /* ── Fan angles ── */
        const FAN_DEG = 80;  /* total spread */

        function fanAngle(i) {
            var t = N > 1 ? i / (N - 1) : 0.5;
            return -FAN_DEG / 2 + t * FAN_DEG;
        }

        var fanAngles = CARDS.map(function (_, i) { return fanAngle(i); });

        /* ── Virtual scroll ── */
        var scrollT = 0, scrollC = 0;

        window.addEventListener('wheel', function (e) {
            scrollT = Math.min(1, Math.max(0, scrollT + e.deltaY / 1400));
        }, { passive: true });

        var touchY = null;
        window.addEventListener('touchstart', function (e) { touchY = e.touches[0].clientY; }, { passive: true });
        window.addEventListener('touchmove', function (e) {
            if (touchY !== null) {
                var dy = touchY - e.touches[0].clientY;
                scrollT = Math.min(1, Math.max(0, scrollT + dy / 700));
                touchY = e.touches[0].clientY;
            }
        }, { passive: true });
        window.addEventListener('touchend', function () { touchY = null; });

        /* ── Mouse tilt ── */
        var mx = 0, my = 0, smx = 0, smy = 0;
        window.addEventListener('mousemove', function (e) {
            mx = e.clientX / window.innerWidth - 0.5;
            my = e.clientY / window.innerHeight - 0.5;
        });

        /* ── Hover ── */
        var hoverI = -1;
        wraps.forEach(function (w, i) {
            w.addEventListener('mouseenter', function () { if (scrollC > 0.4) hoverI = i; });
            w.addEventListener('mouseleave', function () { hoverI = -1; });
        });

        /* ── Easing ── */
        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        /* ── Smooth per-card state ── */
        var curAngle = new Array(N).fill(0);
        var curTransY = new Array(N).fill(0);
        var curScale = new Array(N).fill(1);

        var tiltX = 0, tiltY = 0;

        var hint = document.getElementById('hint');

        /* ── Bob float for stacked state ── */
        var bobT = 0;

        function tick() {
            requestAnimationFrame(tick);

            bobT += 0.018;
            var bobY = Math.sin(bobT) * 6; /* gentle float when stacked */

            /* Smooth scroll */
            scrollC += (scrollT - scrollC) * 0.055;

            /* Smooth mouse */
            smx += (mx - smx) * 0.055;
            smy += (my - smy) * 0.055;

            /* Hint */
            if (scrollT > 0.04) hint.classList.add('gone');
            else hint.classList.remove('gone');

            /* Group tilt */
            tiltX += (-smy * 10 - tiltX) * 0.05;
            tiltY += (smx * 14 - tiltY) * 0.05;
            root.style.transform = 'rotateX(' + tiltX + 'deg) rotateY(' + tiltY + 'deg)';

            wraps.forEach(function (wrap, i) {
                /* Stagger: later cards fan slightly later */
                var stagger = (i / (N - 1)) * 0.2;
                var raw = Math.max(0, scrollC - stagger) / (1 - stagger + 0.001);
                var prog = easeInOutCubic(Math.min(1, raw));

                /* Target angle: 0 (upright) → fan angle */
                var tAngle = fanAngles[i] * prog;

                /*
                  translateY along the card's own axis (after rotation):
                  - When stacked (prog=0): gentle bob
                  - During fan: slight upward arc then settle
                  - When fanned (prog=1): settled position
                */
                var stackBob = bobY * (1 - prog);          /* bob fades as fan opens */
                var fanArc = -20 * Math.sin(prog * Math.PI); /* arc up mid-animation */
                var tTransY = stackBob + fanArc;

                /* Hover */
                var isHovered = (hoverI === i) && scrollC > 0.4;
                var dist = Math.abs(i - hoverI);
                var hoverLift = 0;
                if (hoverI >= 0 && scrollC > 0.4) {
                    hoverLift = Math.max(0, 22 - dist * 10);
                }
                var tScale = isHovered ? 1.1 : 1.0;

                /* Smooth */
                curAngle[i] += (tAngle - curAngle[i]) * 0.08;
                curTransY[i] += ((tTransY - hoverLift) - curTransY[i]) * 0.08;
                curScale[i] += (tScale - curScale[i]) * 0.1;

                /* Apply:
                   transform-origin is center-bottom of the card.
                   rotateZ fans the card around that pivot.
                   translateY moves the card along screen-Y BEFORE rotation is applied
                   (since transform-origin handles the pivot, we push the card up). */
                wrap.style.transform =
                    'rotateZ(' + curAngle[i] + 'deg) ' +
                    'translateY(' + curTransY[i] + 'px) ' +
                    'scale(' + curScale[i] + ')';

                wrap.style.zIndex = isHovered ? 100 : i;

                /* Shadow */
                var sd = isHovered ? 45 : 14;
                inners[i].style.boxShadow =
                    '0 ' + sd + 'px ' + (sd * 2) + 'px rgba(0,0,0,0.75),' +
                    '0 2px 8px rgba(0,0,0,0.5),' +
                    'inset 0 1px 0 rgba(255,255,255,0.14)';
            });
        }

        tick();
    </script>
</body>

</html>
