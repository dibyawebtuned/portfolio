<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizontal SplitText Scroll</title>

    <!-- GSAP Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <!-- ScrollTrigger (MISSING BEFORE) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <!-- ⚠️ SplitText (Club plugin or hosted file) -->
    <script src="https://assets.codepen.io/16327/SplitText3.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .Horizontal {
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .Horizontal__text {
            display: flex;
            width: max-content;
            white-space: nowrap;
            gap: 4vw;
            padding-left: 100vw;
        }

        .heading-xl {
            font-size: clamp(2rem, 10vw, 12rem);
            font-weight: 600;
            line-height: 1.1;
        }
    </style>
</head>

<body>

    <section class="Horizontal">
        <div class="container">
            <h3 class="Horizontal__text heading-xl">
                The containerAnimation property allows us to create ScrollTriggered animations within a container that's
                animated horizontally. It's like having nested ScrollTriggers!
            </h3>
        </div>
    </section>

    <script>
        // ✅ Register plugins AFTER loading
        gsap.registerPlugin(ScrollTrigger, SplitText);

        const wrapper = document.querySelector(".Horizontal");
        const text = document.querySelector(".Horizontal__text");

        // ✅ Correct SplitText usage
        const split = new SplitText(text, { type: "chars" });

        // ✅ Horizontal scroll animation
        const scrollTween = gsap.to(text, {
            x: () => -(text.scrollWidth - window.innerWidth),
            ease: "none",
            scrollTrigger: {
                trigger: wrapper,
                start: "top top",
                end: () => "+=" + text.scrollWidth,
                pin: true,
                scrub: true,
                anticipatePin: 1
            }
        });

        // ✅ Character animation linked to horizontal scroll
        split.chars.forEach((char) => {
            gsap.from(char, {
                yPercent: gsap.utils.random(-200, 200),
                rotation: gsap.utils.random(-20, 20),
                ease: "back.out(1.2)",
                scrollTrigger: {
                    trigger: char,
                    containerAnimation: scrollTween,
                    start: "left 100%",
                    end: "left 30%",
                    scrub: true
                }
            });
        });

    </script>

</body>

</html>
