<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Scroll Text</title>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
        }

        .Horizontal {
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .Horizontal__text {
            display: flex;
            width: max-content;
            white-space: nowrap;
            gap: 1vw;
            padding-left: 100vw;
        }

        .char {
            display: inline-block;
        }

        .heading-xl {
            font-size: clamp(2rem, 10vw, 12rem);
            font-weight: 600;
            line-height: 1.1;
        }
    </style>
</head>

<body>

    <section class="Horizontal">
        <div class="container">
            <h3 class="Horizontal__text heading-xl" id="text">
                The containerAnimation property allows us to create ScrollTriggered animations within a container that's
                animated horizontally.
            </h3>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 🔹 Split text manually (replacement for SplitText)
        const textEl = document.getElementById("text");
        const text = textEl.innerText;
        textEl.innerHTML = text.split("").map(char => {
            return `<span class="char">${char === " " ? "&nbsp;" : char}</span>`;
        }).join("");

        const chars = document.querySelectorAll(".char");
        const wrapper = document.querySelector(".Horizontal");
        const textContainer = document.querySelector(".Horizontal__text");

        // 🔹 Horizontal scroll animation
        const scrollTween = gsap.to(textContainer, {
            xPercent: -100,
            ease: "none",
            scrollTrigger: {
                trigger: wrapper,
                pin: true,
                scrub: true,
                end: "+=4000"
            }
        });

        // 🔹 Character animations
        chars.forEach((char) => {
            gsap.from(char, {
                yPercent: gsap.utils.random(-200, 200),
                rotation: gsap.utils.random(-20, 20),
                ease: "back.out(1.2)",
                scrollTrigger: {
                    trigger: char,
                    containerAnimation: scrollTween,
                    start: "left 100%",
                    end: "left 30%",
                    scrub: 1
                }
            });
        });
    </script>

</body>

</html>
