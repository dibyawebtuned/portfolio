<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>3D Card Fan</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box }
    html, body { width:100%; height:100%; overflow:hidden }
    body { background:#0a0000 }
    canvas { position:fixed; inset:0; width:100%!important; height:100%!important }
    .hint {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      color:#fff; opacity:.4; font-size:12px; font-family:sans-serif;
      pointer-events:none;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="hint">Scroll to fan cards</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

/* ─── CARD DATA ──────────────────────────────────────────────────── */
const CARD_DATA = [
  { rank:'3',  suit:'♠', color:'#111' },
  { rank:'4',  suit:'♥', color:'#cc0000' },
  { rank:'4',  suit:'♦', color:'#cc0000' },
  { rank:'5',  suit:'♠', color:'#111' },
  { rank:'5',  suit:'♣', color:'#111' },
  { rank:'A',  suit:'♠', color:'#111' },
  { rank:'A',  suit:'♥', color:'#cc0000' },
  { rank:'A',  suit:'♦', color:'#cc0000' },
  { rank:'A',  suit:'♣', color:'#111' },
  { rank:'Q',  suit:'♥', color:'#cc0000' },
  { rank:'Q',  suit:'♠', color:'#111' },
];
const NUM = CARD_DATA.length;

/* ─── PROCEDURAL CARD TEXTURE ───────────────────────────────────── */
function makeCardTexture({ rank, suit, color }) {
  const W = 512, H = 716;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  /* white card body */
  const r = 28;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(W-r, 0);
  ctx.quadraticCurveTo(W, 0, W, r);
  ctx.lineTo(W, H-r);
  ctx.quadraticCurveTo(W, H, W-r, H);
  ctx.lineTo(r, H);
  ctx.quadraticCurveTo(0, H, 0, H-r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#faf8f2';
  ctx.fill();

  /* subtle inner border */
  ctx.save();
  ctx.clip();
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 8;
  ctx.strokeRect(14, 14, W-28, H-28);
  ctx.restore();

  /* corner rank + suit */
  ctx.fillStyle = color;
  ctx.font = `bold 72px 'Georgia', serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  /* top-left corner */
  ctx.save();
  ctx.font = `bold 64px Georgia, serif`;
  ctx.textAlign = 'left';
  ctx.fillText(rank, 32, 72);
  ctx.font = `52px Georgia, serif`;
  ctx.fillText(suit, 38, 132);

  /* bottom-right corner (rotated 180°) */
  ctx.translate(W, H);
  ctx.rotate(Math.PI);
  ctx.font = `bold 64px Georgia, serif`;
  ctx.fillText(rank, 32, 72);
  ctx.font = `52px Georgia, serif`;
  ctx.fillText(suit, 38, 132);
  ctx.restore();

  /* centre large suit */
  ctx.font = `220px Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = color;
  ctx.fillText(suit, W/2, H/2);
  ctx.globalAlpha = 1;

  /* centre rank */
  ctx.font = `bold 140px Georgia, serif`;
  ctx.fillStyle = color;
  ctx.fillText(rank, W/2, H/2 - 30);

  /* centre suit (smaller, below rank) */
  ctx.font = `90px Georgia, serif`;
  ctx.fillText(suit, W/2, H/2 + 100);

  return new THREE.CanvasTexture(c);
}

/* ─── CARD BACK ─────────────────────────────────────────────────── */
function makeBackTexture() {
  const W = 512, H = 716;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  /* background */
  ctx.fillStyle = '#1a0505';
  ctx.fillRect(0, 0, W, H);

  /* pattern grid */
  ctx.strokeStyle = '#c8a84b';
  ctx.lineWidth = 1.5;
  const step = 36;
  for (let x = 0; x < W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  /* diagonal cross-hatch */
  ctx.globalAlpha = 0.25;
  for (let i = -H; i < W + H; i += step) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i - H, H); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  /* inner frame */
  ctx.strokeStyle = '#c8a84b';
  ctx.lineWidth = 6;
  ctx.strokeRect(22, 22, W-44, H-44);
  ctx.lineWidth = 2;
  ctx.strokeRect(30, 30, W-60, H-60);

  /* centre spade */
  ctx.fillStyle = '#c8a84b';
  ctx.font = 'bold 120px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('♠', W/2, H/2);

  return new THREE.CanvasTexture(c);
}

/* ─── EDGE TEXTURE ──────────────────────────────────────────────── */
function makeEdgeTexture() {
  const c = document.createElement('canvas');
  c.width = 4; c.height = 4;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#e8e0d0';
  ctx.fillRect(0, 0, 4, 4);
  return new THREE.CanvasTexture(c);
}

/* ─── THREE SETUP ───────────────────────────────────────────────── */
const canvas = document.getElementById('canvas');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0000, 0.035);

const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0.5, 9);

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;

/* ─── LIGHTING ──────────────────────────────────────────────────── */
const dirLight = new THREE.DirectionalLight(0xffeedd, 3.5);
dirLight.position.set(4, 6, 8);
dirLight.castShadow = true;
scene.add(dirLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const fillLight = new THREE.PointLight(0xffd0a0, 1.5, 20);
fillLight.position.set(-4, 2, 5);
scene.add(fillLight);

/* ─── BUILD CARD MESHES ─────────────────────────────────────────── */
const CARD_W = 2.3, CARD_H = 3.22, CARD_D = 0.045;
const group = new THREE.Group();
scene.add(group);
const meshes = [];
const edgeTex = makeEdgeTexture();
const backTex = makeBackTexture();

CARD_DATA.forEach((data, i) => {
  const frontTex = makeCardTexture(data);
  // CanvasTexture is already in display (sRGB) space
  frontTex.colorSpace = THREE.SRGBColorSpace;
  backTex.colorSpace  = THREE.SRGBColorSpace;

  const geo = new THREE.BoxGeometry(CARD_W, CARD_H, CARD_D);

  const mats = [
    new THREE.MeshStandardMaterial({ map: edgeTex }),  // right
    new THREE.MeshStandardMaterial({ map: edgeTex }),  // left
    new THREE.MeshStandardMaterial({ map: edgeTex }),  // top
    new THREE.MeshStandardMaterial({ map: edgeTex }),  // bottom
    new THREE.MeshPhysicalMaterial({ map: frontTex, roughness: 0.35, metalness: 0.0 }), // front (+Z)
    new THREE.MeshPhysicalMaterial({ map: backTex,  roughness: 0.45, metalness: 0.0 }), // back  (-Z)
  ];

  const mesh = new THREE.Mesh(geo, mats);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.position.set(0, -0.8, i * CARD_D);
  group.add(mesh);
  meshes.push(mesh);
});

/* ─── FAN TARGETS ───────────────────────────────────────────────── */
const FAN = 75, RADIUS = 7;
const targets = CARD_DATA.map((_, i) => {
  const t = i / (NUM - 1);
  const angle = THREE.MathUtils.degToRad(-FAN/2 + t * FAN);
  return {
    x: Math.sin(angle) * RADIUS,
    y: Math.cos(angle) * RADIUS - 6,
    rot: angle
  };
});

/* ─── SCROLL ────────────────────────────────────────────────────── */
let progress = 0, targetP = 0;
window.addEventListener('wheel', e => {
  targetP = Math.max(0, Math.min(1, targetP + e.deltaY * 0.0005));
});
/* touch support */
let lastY = null;
window.addEventListener('touchstart', e => { lastY = e.touches[0].clientY; });
window.addEventListener('touchmove', e => {
  const dy = lastY - e.touches[0].clientY;
  lastY = e.touches[0].clientY;
  targetP = Math.max(0, Math.min(1, targetP + dy * 0.002));
});

/* ─── LOOP ──────────────────────────────────────────────────────── */
function animate() {
  requestAnimationFrame(animate);
  progress += (targetP - progress) * 0.05;

  meshes.forEach((m, i) => {
    const tgt = targets[i];
    m.position.x += (tgt.x * progress - m.position.x) * 0.08;
    m.position.y += (tgt.y * progress - m.position.y) * 0.08;
    m.rotation.z += (tgt.rot * progress - m.rotation.z) * 0.08;
    // slight depth separation so cards don't z-fight when stacked
    m.position.z = i * CARD_D * (1 - progress) + i * 0.01 * progress;
  });

  renderer.render(scene, camera);
}
animate();

/* ─── RESIZE ────────────────────────────────────────────────────── */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
