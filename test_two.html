<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottle Lid Scroll Animation</title>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #fff;
            overflow-x: hidden;
        }

        section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .bottle-container {
            position: relative;
            width: 150px;
            height: 400px;
        }

        .bottle {
            width: 100%;
            height: 100%;
            background: url('https://i.postimg.cc/8cXJpQ0P/real-bottle.png') no-repeat center/contain;
            position: relative;
            z-index: 1;
        }

        .lid {
            width: 60px;
            height: 60px;
            background: url('https://i.postimg.cc/Y0k0X5cZ/real-lid.png') no-repeat center/contain;
            position: absolute;
            top: -100px;
            /* starting above bottle */
            left: 45px;
            transform-origin: center center;
            z-index: 2;
        }

        /* SVG path invisible */
        svg {
            position: absolute;
            width: 0;
            height: 0;
        }
    </style>
</head>

<body>

    <section class="hero-section">
        <div class="bottle-container">
            <div class="bottle"></div>
            <div class="lid"></div>

            <!-- Define screw path for lid -->
            <svg>
                <path id="lidPath" d="M75,0 
        C120,0 120,180 75,180" fill="none" />
            </svg>
        </div>
    </section>

    <section style="background:#eee;">Scroll down to screw the lid</section>
    <section style="background:#ddd;">Bottle closed here</section>

    <script>
        gsap.registerPlugin(ScrollTrigger, MotionPathPlugin);

        const lid = document.querySelector(".lid");

        gsap.to(lid, {
            scrollTrigger: {
                trigger: ".hero-section",
                start: "top top",
                endTrigger: "section:nth-of-type(3)",
                end: "top center",
                scrub: 1,
                markers: true
            },
            rotation: 720, // rotate for screw effect
            motionPath: {
                path: "#lidPath",
                align: "#lidPath",
                alignOrigin: [0.5, 0.5],
                autoRotate: true
            },
            ease: "power1.inOut"
        });
    </script>

</body>

</html>
